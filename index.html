<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crop Yield Prediction</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/a2e2e6a7a4.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg-color: #fdfcfb;
      --text-color: #333;
      --card-bg: #fff;
      --btn-bg: linear-gradient(90deg, #43cea2, #185a9d);
      --result-bg: #e8f5e9;
    }

    [data-theme="dark"] {
      --bg-color: #0e0e16;
      --text-color: #f8f9fa;
      --card-bg: #1b1b2f;
      --btn-bg: linear-gradient(90deg, #8e2de2, #4a00e0);
      --result-bg: #222831;
    }

    body {
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .form-card {
      background-color: var(--card-bg);
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    .form-label {
      font-weight: 600;
    }

    .btn-gradient {
      background: var(--btn-bg);
      color: white;
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 10px;
      transition: 0.3s ease;
    }

    .btn-gradient:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .title-icon {
      font-size: 1.8rem;
      color: #43cea2;
    }

    .result-box {
      background: var(--result-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    h1, h2, h3 {
      font-weight: 600;
    }

    .theme-switcher select {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid #999;
      padding: 4px 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body data-theme="light">

  <!-- Theme Switcher (Top Right) -->
  <div class="container mt-3 d-flex justify-content-end">
    <div class="d-flex align-items-center gap-2">
      <label for="themeSwitcher" class="form-label m-0">Theme:</label>
      <select id="themeSwitcher" class="form-select w-auto">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
  </div>

  <div class="container py-5">
    <h1 class="text-center mb-4" data-aos="zoom-in"><i class="fas fa-seedling title-icon"></i> Crop Yield Prediction</h1>

    <div class="form-card mx-auto col-lg-8" data-aos="fade-up" data-aos-delay="100">
      <h3 class="text-center mb-4"><i class="fas fa-edit"></i> Enter Crop Details</h3>
      <form action="/predict" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="Year" class="form-label">Year</label>
            <input type="number" class="form-control" name="Year" id="Year" required>
          </div>
          <div class="col-md-6">
            <label for="Area" class="form-label">Area</label>
            <input type="text" class="form-control" name="Area" id="Area" required>
          </div>
          <div class="col-md-6">
            <label for="Item" class="form-label">Crop Item</label>
            <input type="text" class="form-control" name="Item" id="Item" required>
          </div>
          <div class="col-md-6">
            <label for="average_rain_fall_mm_per_year" class="form-label">Rainfall (mm/year)</label>
            <input type="number" step="0.1" class="form-control" name="average_rain_fall_mm_per_year" id="average_rain_fall_mm_per_year" required>
          </div>
          <div class="col-md-6">
            <label for="pesticides_tonnes" class="form-label">Pesticides (tonnes)</label>
            <input type="number" step="0.1" class="form-control" name="pesticides_tonnes" id="pesticides_tonnes" required>
          </div>
          <div class="col-md-6">
            <label for="avg_temp" class="form-label">Select Avg Temperature (°C)</label>
            <select name="avg_temp" id="avg_temp" class="form-control" required>
              <option value="">-- Select Temperature --</option>
            </select>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-gradient w-100 mt-3">
              <i class="fas fa-brain"></i> Predict Yield
            </button>
          </div>
        </div>
      </form>

      {% if prediction %}
      <div class="result-box mt-4 text-center" data-aos="fade-in">
        <h4>Predicted Yield:</h4>
        <h2><i class="fas fa-chart-line"></i> {{ prediction }}</h2>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- JS for Auto-Fill -->
  <script>
    document.getElementById('Year').addEventListener('change', fetchData);
    document.getElementById('Area').addEventListener('blur', fetchData);
    document.getElementById('Item').addEventListener('blur', fetchData);

    function fetchData() {
      const Year = document.getElementById('Year').value;
      const Area = document.getElementById('Area').value;
      const Item = document.getElementById('Item').value;

      if (Year && Area && Item) {
        fetch('/fetch_features', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ Year, Area, Item })
        })
        .then(response => response.json())
        .then(data => {
          if (!data.error) {
            document.getElementById('average_rain_fall_mm_per_year').value = data.average_rain_fall_mm_per_year;
            document.getElementById('pesticides_tonnes').value = data.pesticides_tonnes;

            const tempDropdown = document.getElementById('avg_temp');
            tempDropdown.innerHTML = '<option value="">-- Select Temperature --</option>';
            data.avg_temp_options.forEach(temp => {
              const option = document.createElement('option');
              option.value = temp;
              option.textContent = temp;
              tempDropdown.appendChild(option);
            });
          }
        })
        .catch(error => console.error('Error:', error));
      }
    }

    // Theme Switcher
    const themeSelect = document.getElementById('themeSwitcher');
    themeSelect.addEventListener('change', () => {
      document.documentElement.setAttribute('data-theme', themeSelect.value);
      localStorage.setItem('theme', themeSelect.value);
    });

    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      themeSelect.value = savedTheme;
      document.documentElement.setAttribute('data-theme', savedTheme);
    });
  </script>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
